name: 更新策略面板数据

on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install yfinance
      - run: python dashboard/data_fetcher.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'auto: 更新策略面板数据'
          commit_user_name: 'Dashboard Bot'
          commit_user_email: 'bot@study-career.dashboard'
          file_pattern: 'dashboard/data.json'